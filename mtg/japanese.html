## Small Reading Note

A few keyword readings are not what you'd necessarily guess from normal Japanese:

* 絆魂 → **はんこん** (Lifelink)
* 呪禁 → **じゅごん** (Hexproof)
* 威迫 → **いはく** (Menace)
* 接死 → **せっし** (Deathtouch)
* 護法 → **ごほう** (Ward)

These are worth memorizing as complete vocabulary items because they appear repeatedly on cards.
